# The flightdeck manifest contract (v1, final — spec §6).
# The only file in this repo with app-specific infra facts. Every field here
# exists because a real deploy needed it — no speculative fields, no `image`
# (CI computes and injects the image reference per build; apps never pin one).
name: board          # dns-safe service name; https://board.fd.robertpuffe.com
port: 8080           # port the container listens on
healthcheck: /healthz  # HTTP path; must return 200 within 30s of container start
cpu: 256             # Fargate CPU units (valid cpu/memory pairs enforced by
memory: 512          # app-manifest.schema.json — 256/512 fits this demo app)
env:                 # non-secret config only — NO secrets, tokens, or credentials
  BOARD_TITLE: message board   # page heading; defaults to "message board" if unset
